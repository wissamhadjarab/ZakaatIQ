{% extends "base.html" %}
{% block content %}

<div class="container py-5">

<!-- PAGE HEADER -->
<div class="text-center mb-5">
    <h2 class="gold-text fw-bold">AI Income & Savings Forecast</h2>
    <p class="text-muted">
        Generate a financial projection based on your trends.
    </p>
</div>

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="dashboard-card text-center">

<i class="bi bi-graph-up card-icon"></i>

<h4 class="mt-3">Generate Forecast</h4>

<p class="text-muted mb-4">
Predict your financial growth using our AI forecast model.
</p>

<form method="POST">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

<button class="btn btn-warning px-4 py-2 fw-bold">
Generate Forecast
</button>

</form>

</div>

</div>

</div>

{% if graph %}

<div class="row justify-content-center mt-5">

<div class="col-lg-8">

<div class="dashboard-card">

<h4 class="gold-text mb-4 text-center">6-Month Forecast</h4>

<canvas id="forecastChart"></canvas>

</div>

</div>

</div>

{% endif %}

</div>


<!-- CHART JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

{% if graph %}

/* Example forecast data */
const months = ["Jan","Feb","Mar","Apr","May","Jun"]

const income = [2000,2100,2200,2300,2400,2550]

const ctx = document.getElementById("forecastChart").getContext("2d")

new Chart(ctx, {

type: "line",

data: {

labels: months,

datasets: [{
label: "Predicted Income (€)",
data: income,
borderWidth: 3,
tension: 0.4

}]

},

options: {

responsive: true,

plugins: {
legend: {
display: true
}
},

scales: {
y: {
beginAtZero: false
}
}

}

})

{% endif %}

</script>

{% endblock %}
