{% extends "base.html" %}
{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-lg-6">

            <div class="dashboard-card text-center p-5">

                <!-- ICON -->
                <div class="mb-4">
                    <i class="bi bi-check-circle-fill" style="font-size:60px; color:#28a745;"></i>
                </div>

                <!-- TITLE -->
                <h2 class="gold-text fw-bold">
                    {{ t('donate') }}
                </h2>

                <!-- MESSAGE -->
                <p class="text-muted mt-3">
                    {{ t('donate_desc') }}
                </p>

                <!-- AMOUNT -->
                <h1 class="fw-bold my-4" style="color:#28a745;">
                    €{{ amount }}
                </h1>

                <!-- INFO -->
                <p class="text-muted">
                    {{ t('progress') }}
                </p>

                <hr class="my-4">

                <!-- BUTTONS -->
                <div class="d-grid gap-3">

                    <a href="{{ url_for('dashboard') }}" class="btn btn-success fw-bold py-2">
                        {{ t('dashboard') }}
                    </a>

                    <a href="{{ url_for('donate') }}" class="btn btn-outline-dark">
                        {{ t('donate') }}
                    </a>

                </div>

            </div>

        </div>
    </div>

</div>

{% endblock %}
