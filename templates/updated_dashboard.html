{% extends "base.html" %}
{% block content %}

<div class="container py-5">

<h2 class="mb-4">Dashboard</h2>

<div class="row g-4">

<div class="col-md-4">
<div class="dashboard-card text-center">
<h3>€{{ zakat_due }}</h3>
<p>Zakat Due</p>
</div>
</div>

<div class="col-md-4">
<div class="dashboard-card text-center">
<h3>€{{ donated }}</h3>
<p>Donated</p>
</div>
</div>

<div class="col-md-4">
<div class="dashboard-card text-center">
<h3>{{ progress }}%</h3>
<p>Progress</p>
</div>
</div>

</div>

<!-- CHART -->
<div class="dashboard-card mt-5">
<canvas id="chart"></canvas>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
new Chart(document.getElementById('chart'), {
type: 'line',
data: {
labels: {{ labels|safe }},
datasets: [{
label: 'Savings Forecast',
data: {{ values|safe }},
}]
}
});
</script>

{% endblock %}
